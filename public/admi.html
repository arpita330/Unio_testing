<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nexo | Admin Console</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f4ff;min-height:100vh;padding-bottom:40px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:white;border-radius:1.75rem;padding:2rem;width:100%;max-width:360px;box-shadow:0 4px 20px rgba(0,87,255,0.1)}
.login-logo{text-align:center;margin-bottom:1.5rem}
.login-logo h1{font-size:2rem;font-weight:900;color:#0057ff;font-style:italic}
.login-logo p{font-size:.7rem;font-weight:700;color:#94a3b8;letter-spacing:.3em;text-transform:uppercase;margin-top:4px}
.l-input{width:100%;padding:1rem 1.25rem;background:#f8fafc;border:2px solid #f1f5f9;border-radius:1rem;font-size:1.4rem;font-weight:700;outline:none;font-family:inherit;margin-bottom:1rem;text-align:center;letter-spacing:.5em}
.l-input:focus{border-color:#0057ff;background:white}
.login-btn{width:100%;padding:1rem;background:#0057ff;color:white;border:none;border-radius:1rem;font-size:.85rem;font-weight:800;text-transform:uppercase;cursor:pointer}
.login-err{background:#fee2e2;color:#dc2626;padding:.75rem;border-radius:.75rem;font-size:.75rem;font-weight:700;text-align:center;margin-bottom:1rem;display:none}
.login-err.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.top-bar{background:white;border-bottom:1px solid #f1f5f9;padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.top-bar h1{font-size:.9rem;font-weight:900;color:#0057ff;font-style:italic}
.container{max-width:600px;margin:0 auto;padding:1.25rem}
.tabs{display:flex;background:white;border-radius:1rem;padding:4px;margin-bottom:1.25rem;overflow-x:auto;gap:4px}
.tab{flex-shrink:0;padding:.6rem .9rem;font-weight:700;font-size:.65rem;border-radius:.75rem;cursor:pointer;color:#94a3b8;text-transform:uppercase;background:none;border:none}
.tab.active{background:#0057ff;color:white}
.tab-section{display:none}
.tab-section.active{display:block}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.25rem}
.stat-card{background:white;border-radius:1.25rem;padding:1.25rem;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.stat-label{font-size:.65rem;font-weight:700;color:#94a3b8;text-transform:uppercase}
.stat-val{font-size:1.5rem;font-weight:900;color:#0f172a}
.section-card{background:white;border-radius:1.5rem;padding:1.25rem;margin-bottom:1rem}
.section-title{font-size:.7rem;font-weight:800;color:#94a3b8;margin-bottom:1rem}
.a-input{width:100%;padding:1rem 1.25rem;background:#f8fafc;border:2px solid #f1f5f9;border-radius:1rem;font-size:.9rem;font-weight:600;outline:none;margin-bottom:.75rem}
.a-input:focus{border-color:#0057ff;background:white}
.a-btn{width:100%;padding:1rem;border:none;border-radius:1rem;font-size:.85rem;font-weight:800;text-transform:uppercase;cursor:pointer;color:white;margin-bottom:.75rem}
.msg{padding:.75rem 1rem;border-radius:.75rem;font-size:.75rem;font-weight:700;text-align:center;margin-bottom:.75rem;display:none}
.msg.error{background:#fee2e2;color:#dc2626;display:block}
.msg.success{background:#dcfce7;color:#16a34a;display:block}
.refresh-btn{background:#eff6ff;border:none;color:#0057ff;padding:.5rem 1rem;border-radius:.75rem;font-size:.7rem;font-weight:700;cursor:pointer;margin-bottom:1rem}
.user-item{background:#f8fafc;border-radius:1rem;padding:.9rem 1rem;margin-bottom:.6rem;border:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center}
.user-name{font-size:.8rem;font-weight:700;color:#0f172a}
.user-mob{font-size:.65rem;color:#94a3b8;margin-top:2px}
.user-bal{font-size:.9rem;font-weight:900;color:#0057ff}
.empty{text-align:center;padding:2rem;color:#94a3b8;font-size:.8rem}
.logout-btn{background:#fee2e2;border:none;color:#dc2626;padding:.4rem .9rem;border-radius:.75rem;font-size:.7rem;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-wrap" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <h1>NEXO</h1>
      <p>Admin Panel</p>
    </div>
    <div id="login-err" class="login-err">Wrong password!</div>
    <input type="tel" inputmode="numeric" maxlength="4" class="l-input" id="pass-input" placeholder="••••">
    <button class="login-btn" onclick="doLogin()"><i class="fa-solid fa-lock"></i> Enter</button>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" style="display:none">
  <div class="top-bar">
    <h1><i class="fa-solid fa-shield-haltered"></i> NEXO Admin</h1>
    <button class="logout-btn" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
  </div>
  <div class="container">
    <div class="tabs">
      <button class="tab active" data-tab="stats">📊 Stats</button>
      <button class="tab" data-tab="users">👥 Users</button>
      <button class="tab" data-tab="balance">💰 Balance</button>
    </div>

    <!-- Stats Tab -->
    <div id="tab-stats" class="tab-section active">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-val" id="s-users">—</div></div>
        <div class="stat-card"><div class="stat-label">Total Balance</div><div class="stat-val" id="s-bal" style="color:#16a34a">—</div></div>
      </div>
      <button class="refresh-btn" onclick="loadStats()"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
    </div>

    <!-- Users Tab -->
    <div id="tab-users" class="tab-section">
      <button class="refresh-btn" onclick="loadUsers()"><i class="fa-solid fa-rotate-right"></i> Refresh Users</button>
      <div id="users-list"><div class="empty">Loading...</div></div>
    </div>

    <!-- Balance Management -->
    <div id="tab-balance" class="tab-section">
      <div class="section-card">
        <div class="section-title"><i class="fa-solid fa-plus-circle"></i> Add Balance</div>
        <div id="bal-msg" class="msg"></div>
        <input type="text" class="a-input" id="b-mobile" placeholder="Mobile Number">
        <input type="number" class="a-input" id="b-amount" placeholder="Amount (₹)">
        <button class="a-btn" style="background:#16a34a" onclick="addBalance()"><i class="fa-solid fa-plus"></i> Add Balance</button>
      </div>
      <div class="section-card">
        <div class="section-title"><i class="fa-solid fa-minus-circle"></i> Deduct Balance</div>
        <div id="ded-msg" class="msg"></div>
        <input type="text" class="a-input" id="d-mobile" placeholder="Mobile Number">
        <input type="number" class="a-input" id="d-amount" placeholder="Amount (₹)">
        <button class="a-btn" style="background:#dc2626" onclick="deductBalance()"><i class="fa-solid fa-minus"></i> Deduct Balance</button>
      </div>
    </div>
  </div>
</div>

<script>
const ADMIN_KEY = '2486';
let usersDB = [];

// Load users from localStorage (shared with user dashboard)
function loadUsersFromStorage() {
  const stored = localStorage.getItem('nexo_users');
  if(stored) {
    usersDB = JSON.parse(stored);
  } else {
    // Default demo users
    usersDB = [
      { id: '1', name: 'Rajesh Kumar', mobile: '9876543210', balance: 12500, password: '1234', wallet_id: 'NX10001' },
      { id: '2', name: 'Priya Sharma', mobile: '9988776655', balance: 3400, password: '1234', wallet_id: 'NX10002' },
      { id: '3', name: 'Amit Verma', mobile: '9123456789', balance: 780, password: '1234', wallet_id: 'NX10003' }
    ];
    saveUsersToStorage();
  }
}

function saveUsersToStorage() {
  localStorage.setItem('nexo_users', JSON.stringify(usersDB));
}

// Auto login on 4 digits
window.onload = function() {
  const saved = localStorage.getItem('nexo_admin_logged');
  if(saved === 'true') {
    showDashboard();
  }
  
  const passInput = document.getElementById('pass-input');
  passInput.addEventListener('input', function() {
    let val = this.value.replace(/[^0-9]/g, '');
    this.value = val;
    if(val.length === 4) {
      doLogin();
    }
  });
};

function doLogin() {
  const pass = document.getElementById('pass-input').value;
  if(pass === ADMIN_KEY) {
    localStorage.setItem('nexo_admin_logged', 'true');
    document.getElementById('login-err').classList.remove('show');
    showDashboard();
  } else {
    document.getElementById('login-err').classList.add('show');
    document.getElementById('pass-input').value = '';
    setTimeout(() => {
      document.getElementById('login-err').classList.remove('show');
    }, 2000);
  }
}

function showDashboard() {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadUsersFromStorage();
  loadStats();
  loadUsers();
}

function doLogout() {
  localStorage.removeItem('nexo_admin_logged');
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pass-input').value = '';
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    const tabId = this.getAttribute('data-tab');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.tab-section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(`tab-${tabId}`).classList.add('active');
    if(tabId === 'users') loadUsers();
    if(tabId === 'stats') loadStats();
  });
});

function showMsg(elementId, text, type) {
  const el = document.getElementById(elementId);
  el.textContent = text;
  el.className = 'msg ' + type;
  setTimeout(() => el.className = 'msg', 3000);
}

function loadStats() {
  const totalUsers = usersDB.length;
  const totalBalance = usersDB.reduce((sum, u) => sum + u.balance, 0);
  document.getElementById('s-users').textContent = totalUsers;
  document.getElementById('s-bal').textContent = '₹' + totalBalance.toFixed(2);
}

function loadUsers() {
  const container = document.getElementById('users-list');
  if(usersDB.length === 0) {
    container.innerHTML = '<div class="empty">No users found</div>';
    return;
  }
  let html = '';
  usersDB.forEach(u => {
    html += `<div class="user-item">
      <div>
        <div class="user-name">${escapeHtml(u.name)}</div>
        <div class="user-mob">📱 ${u.mobile}</div>
      </div>
      <div class="user-bal">₹${u.balance.toFixed(2)}</div>
    </div>`;
  });
  container.innerHTML = html;
}

async function addBalance() {
  const mobile = document.getElementById('b-mobile').value.trim();
  const amount = parseFloat(document.getElementById('b-amount').value);
  
  if(!mobile || !amount || amount <= 0) {
    return showMsg('bal-msg', 'Valid mobile & amount required!', 'error');
  }
  
  const userIndex = usersDB.findIndex(u => u.mobile === mobile);
  if(userIndex === -1) {
    return showMsg('bal-msg', 'User not found!', 'error');
  }
  
  // Add balance
  usersDB[userIndex].balance += amount;
  saveUsersToStorage();
  
  // Create transaction record for user
  const txns = JSON.parse(localStorage.getItem('nexo_transactions_' + usersDB[userIndex].id) || '[]');
  txns.unshift({
    id: Date.now(),
    type: 'deposit',
    amount: amount,
    status: 'completed',
    remark: 'Admin credited',
    tx_time: new Date().toISOString(),
    sender_id: { name: 'Nexo Admin', mobile: 'ADMIN' },
    receiver_id: { name: usersDB[userIndex].name, mobile: usersDB[userIndex].mobile }
  });
  localStorage.setItem('nexo_transactions_' + usersDB[userIndex].id, JSON.stringify(txns.slice(0, 50)));
  
  showMsg('bal-msg', `✅ ₹${amount} added to ${mobile}! New balance: ₹${usersDB[userIndex].balance.toFixed(2)}`, 'success');
  document.getElementById('b-mobile').value = '';
  document.getElementById('b-amount').value = '';
  loadStats();
  loadUsers();
  
  // Also update current session user if it's the same
  const currentUser = JSON.parse(localStorage.getItem('nexo_current_user') || '{}');
  if(currentUser.mobile === mobile) {
    currentUser.balance = usersDB[userIndex].balance;
    localStorage.setItem('nexo_current_user', JSON.stringify(currentUser));
  }
}

async function deductBalance() {
  const mobile = document.getElementById('d-mobile').value.trim();
  const amount = parseFloat(document.getElementById('d-amount').value);
  
  if(!mobile || !amount || amount <= 0) {
    return showMsg('ded-msg', 'Valid mobile & amount required!', 'error');
  }
  
  const userIndex = usersDB.findIndex(u => u.mobile === mobile);
  if(userIndex === -1) {
    return showMsg('ded-msg', 'User not found!', 'error');
  }
  
  if(usersDB[userIndex].balance < amount) {
    return showMsg('ded-msg', 'Insufficient balance!', 'error');
  }
  
  usersDB[userIndex].balance -= amount;
  saveUsersToStorage();
  
  const txns = JSON.parse(localStorage.getItem('nexo_transactions_' + usersDB[userIndex].id) || '[]');
  txns.unshift({
    id: Date.now(),
    type: 'withdraw',
    amount: amount,
    status: 'completed',
    remark: 'Admin deducted',
    tx_time: new Date().toISOString(),
    sender_id: { name: usersDB[userIndex].name, mobile: usersDB[userIndex].mobile },
    receiver_id: { name: 'Nexo Admin', mobile: 'ADMIN' }
  });
  localStorage.setItem('nexo_transactions_' + usersDB[userIndex].id, JSON.stringify(txns.slice(0, 50)));
  
  showMsg('ded-msg', `✅ ₹${amount} deducted from ${mobile}! New balance: ₹${usersDB[userIndex].balance.toFixed(2)}`, 'success');
  document.getElementById('d-mobile').value = '';
  document.getElementById('d-amount').value = '';
  loadStats();
  loadUsers();
  
  const currentUser = JSON.parse(localStorage.getItem('nexo_current_user') || '{}');
  if(currentUser.mobile === mobile) {
    currentUser.balance = usersDB[userIndex].balance;
    localStorage.setItem('nexo_current_user', JSON.stringify(currentUser));
  }
}

function escapeHtml(str) {
  if(!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if(m === '&') return '&amp;';
    if(m === '<') return '&lt;';
    if(m === '>') return '&gt;';
    return m;
  });
}

// Initial load
loadUsersFromStorage();
</script>
</body>
</html>
